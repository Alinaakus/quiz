<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Какой ты герой русской классики?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Raleway', sans-serif;
    background: #0f1a2e;
    color: #e8dcc8;
    min-height: 100vh;
    padding: 20px;
  }

  .quiz-wrap {
    max-width: 560px;
    margin: 0 auto;
  }

  .quiz-header {
    text-align: center;
    padding: 32px 0 24px;
  }

  .quiz-header .tag {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c8a96e;
    margin-bottom: 12px;
  }

  .quiz-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    line-height: 1.3;
    color: #f0e6d0;
    margin-bottom: 10px;
  }

  .quiz-header p {
    font-size: 14px;
    color: #8a9bb5;
    font-weight: 300;
    line-height: 1.6;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: #c8a96e;
    margin: 20px auto;
    opacity: 0.4;
  }

  .progress-bar {
    height: 3px;
    background: #1e2d45;
    border-radius: 10px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c8a96e, #e8c98e);
    border-radius: 10px;
    transition: width 0.5s ease;
    width: 0%;
  }
  .progress-text {
    text-align: right;
    font-size: 11px;
    color: #c8a96e;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .question-card {
    background: #162030;
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    border: 1px solid #1e2d45;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-num {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c8a96e;
    margin-bottom: 10px;
  }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    line-height: 1.45;
    color: #f0e6d0;
    margin-bottom: 22px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: #0f1a2e;
    border: 1.5px solid #1e2d45;
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    color: #c8d8e8;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.5;
  }

  .option-btn:hover {
    border-color: #c8a96e;
    background: #162030;
    transform: translateX(4px);
    color: #f0e6d0;
  }

  .option-btn.selected {
    border-color: #c8a96e;
    background: linear-gradient(135deg, #1e2d45, #162030);
    color: #e8c98e;
    font-weight: 500;
  }

  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(5,10,20,0.85);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .overlay.show {
    display: flex;
    animation: overlayIn 0.3s ease;
  }

  @keyframes overlayIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .result-card {
    background: #162030;
    border: 1px solid #2a3d55;
    border-radius: 20px;
    padding: 36px 28px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: cardIn 0.4s ease;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .result-icon {
    font-size: 48px;
    margin-bottom: 8px;
  }

  .result-tag {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c8a96e;
    margin-bottom: 8px;
  }

  .result-name {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    color: #f0e6d0;
    margin-bottom: 4px;
  }

  .result-book {
    font-size: 13px;
    color: #c8a96e;
    font-style: italic;
    margin-bottom: 16px;
  }

  .result-divider {
    width: 40px;
    height: 1px;
    background: #2a3d55;
    margin: 16px auto;
  }

  .result-desc {
    font-size: 14px;
    line-height: 1.75;
    color: #a8b8cc;
    margin-bottom: 10px;
  }

  .result-quote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: #c8a96e;
    line-height: 1.6;
    padding: 14px 18px;
    background: #0f1a2e;
    border-radius: 10px;
    border-left: 3px solid #c8a96e;
    margin: 16px 0 24px;
  }

  .retry-btn {
    background: #c8a96e;
    color: #0f1a2e;
    border: none;
    border-radius: 12px;
    padding: 14px 32px;
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .retry-btn:hover {
    background: #e8c98e;
    transform: translateY(-2px);
  }

  .start-screen {
    text-align: center;
    padding: 20px 0;
  }

  .start-btn {
    background: #c8a96e;
    color: #0f1a2e;
    border: none;
    border-radius: 14px;
    padding: 16px 40px;
    font-family: 'Raleway', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 8px;
  }

  .start-btn:hover {
    background: #e8c98e;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(200,169,110,0.25);
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="tag">тест · русская классика</div>
    <h1>Какой ты герой русской классики?</h1>
    <div class="divider"></div>
    <p>7 вопросов — и узнаешь, кто из великих литературных мужчин живёт в тебе</p>
  </div>

  <div class="start-screen" id="startScreen">
    <button class="start-btn" onclick="startQuiz()">Начать тест →</button>
  </div>

  <div id="quizBlock" class="hidden">
    <div class="progress-text" id="progressText">1 / 7</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="question-card" id="questionCard"></div>
  </div>
</div>

<div class="overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-tag">Твой герой</div>
    <div class="result-name" id="resultName"></div>
    <div class="result-book" id="resultBook"></div>
    <div class="result-divider"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="result-quote" id="resultQuote"></div>
    <button class="retry-btn" onclick="restartQuiz()">Пройти ещё раз</button>
  </div>
</div>

<script>
const questions = [
  {
    text: "Пятница вечер, ты свободен. Что делаешь?",
    options: [
      { text: "Иду на вечеринку, хотя не очень хотел — и неожиданно становлюсь душой компании", hero: "pierre" },
      { text: "Сижу один, думаю о смысле жизни и своём месте в мире", hero: "andrei" },
      { text: "Пишу. Или читаю. Или просто думаю о ней", hero: "master" },
      { text: "Помогаю другу разобраться с его проблемами — своих нет", hero: "razumihin" },
      { text: "Составляю план на следующую неделю и ложусь спать вовремя", hero: "stolz" }
    ]
  },
  {
    text: "Как ты проявляешь любовь?",
    options: [
      { text: "Неловко, но искренне — могу сказать что-то невпопад, но чувства настоящие", hero: "pierre" },
      { text: "Сдержанно. Люблю глубоко, но не умею это показывать", hero: "andrei" },
      { text: "Полностью растворяюсь в человеке — он становится смыслом всего", hero: "master" },
      { text: "Делом — приду, помогу, решу, поддержу", hero: "razumihin" },
      { text: "Стабильностью и надёжностью — ты всегда можешь на меня рассчитывать", hero: "stolz" }
    ]
  },
  {
    text: "Друг попал в беду. Твои действия?",
    options: [
      { text: "Броситься помогать немедленно, даже если сам не знаю как", hero: "pierre" },
      { text: "Помогу, но скорее советом — эмоциональная поддержка даётся тяжело", hero: "andrei" },
      { text: "Переживаю вместе с ним всей душой, но практически беспомощен", hero: "master" },
      { text: "Первым прибегу, последним уйду, найду выход из любой ситуации", hero: "razumihin" },
      { text: "Чётко оценю ситуацию и предложу конкретный план действий", hero: "stolz" }
    ]
  },
  {
    text: "Что тебя мучает больше всего?",
    options: [
      { text: "Что я до сих пор не понял, зачем всё это и кто я такой", hero: "pierre" },
      { text: "Что мир несправедлив, а люди редко дотягиваются до своих идеалов", hero: "andrei" },
      { text: "Что творчество и любовь не защищены от жестокости мира", hero: "master" },
      { text: "Да особо ничего — жизнь надо решать, а не страдать", hero: "razumihin" },
      { text: "Бездействие и трата времени впустую", hero: "stolz" }
    ]
  },
  {
    text: "Выбери фразу, которая про тебя:",
    options: [
      { text: "Я часто не понимаю людей, но всё равно им доверяю", hero: "pierre" },
      { text: "Я многого хочу от жизни — и злюсь, когда она не соответствует", hero: "andrei" },
      { text: "Есть один человек, ради которого я готов на всё", hero: "master" },
      { text: "Я лучше сделаю сам, чем буду ждать пока кто-то поможет", hero: "razumihin" },
      { text: "У меня всегда есть план. И запасной тоже", hero: "stolz" }
    ]
  },
  {
    text: "Как ты относишься к деньгам и карьере?",
    options: [
      { text: "Деньги есть — трачу бестолково, карьера не главное", hero: "pierre" },
      { text: "Карьера важна, но это не самоцель — есть вещи важнее", hero: "andrei" },
      { text: "Мне это неинтересно. Есть работа — и есть настоящая жизнь", hero: "master" },
      { text: "Деньги зарабатываю трудом, не жалуюсь, не жадничаю", hero: "razumihin" },
      { text: "Финансовая независимость — основа всего остального", hero: "stolz" }
    ]
  },
  {
    text: "Каким тебя видят окружающие?",
    options: [
      { text: "Немного странным, но очень добрым", hero: "pierre" },
      { text: "Холодным, хотя на самом деле это не так", hero: "andrei" },
      { text: "Загадочным и немного не от мира сего", hero: "master" },
      { text: "Надёжным — тем, к кому идут когда плохо", hero: "razumihin" },
      { text: "Успешным и собранным — таким, на кого хочется равняться", hero: "stolz" }
    ]
  }
];

const heroes = {
  pierre: {
    name: "Пьер Безухов",
    book: "«Война и мир», Лев Толстой",
    icon: "🌍",
    desc: "Ты — большой, тёплый, немного неуклюжий человек, в котором огромное сердце. Деньги, положение, светские правила — всё это тебя не особо интересует. Ты ищешь смысл — честно, упорно, через ошибки. Люди тянутся к тебе, потому что ты настоящий. Ты можешь казаться странным, но именно рядом с тобой становится теплее.",
    quote: "«Надо жить, надо любить, надо верить.»"
  },
  andrei: {
    name: "Андрей Болконский",
    book: "«Война и мир», Лев Толстой",
    icon: "⚔️",
    desc: "Ты требователен — к себе и к миру. Холодность снаружи скрывает огромные внутренние запросы к жизни. Ты хочешь, чтобы всё было настоящим — поступки, слова, люди. Умеешь быть благородным в самые трудные моменты. И умеешь меняться — хотя это даётся дорогой ценой.",
    quote: "«Надо быть уверенным, чтоб действовать; нужно верить в то, что делаешь.»"
  },
  master: {
    name: "Мастер",
    book: "«Мастер и Маргарита», Михаил Булгаков",
    icon: "✍️",
    desc: "Ты живёшь внутренней жизнью — глубокой, богатой, не всегда понятной окружающим. Для тебя есть работа — и есть настоящее. Любишь одного человека — и это любовь на всё. Мир может быть к тебе жесток, но ты не размениваешься на мелкое. Ты создаёшь что-то важное — даже если этого никто не видит.",
    quote: "«Рукописи не горят.»"
  },
  razumihin: {
    name: "Разумихин",
    book: "«Преступление и наказание», Фёдор Достоевский",
    icon: "🤝",
    desc: "Ты — человек, на которого можно положиться. Всегда. При любых обстоятельствах. Ты не ноешь, не рефлексируешь бесконечно — ты действуешь. Друзья для тебя святое. У тебя есть юмор, энергия и способность находить выход там, где другие опускают руки. Рядом с тобой люди чувствуют себя в безопасности.",
    quote: "«Главное — это люди. Остальное приложится.»"
  },
  stolz: {
    name: "Штольц",
    book: "«Обломов», Иван Гончаров",
    icon: "🏔️",
    desc: "Ты знаешь, чего хочешь — и идёшь к этому. Без лишних слов, без раскачки. Ты ценишь время, уважаешь труд и умеешь строить жизнь руками. В любви ты надёжен и верен. Рядом с тобой хочется тоже двигаться вперёд — потому что ты заряжаешь своей энергией и целеустремлённостью.",
    quote: "«Жизнь — это труд, образ, цель.»"
  }
};

let current = 0;
let scores = { pierre: 0, andrei: 0, master: 0, razumihin: 0, stolz: 0 };

function startQuiz() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('quizBlock').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const card = document.getElementById('questionCard');

  document.getElementById('progressText').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = `${(current / questions.length) * 100}%`;

  card.innerHTML = `
    <div class="question-num">Вопрос ${current + 1}</div>
    <div class="question-text">${q.text}</div>
    <div class="options">
      ${q.options.map(opt => `
        <button class="option-btn" onclick="selectOption(this, '${opt.hero}')">
          ${opt.text}
        </button>
      `).join('')}
    </div>
  `;
}

function selectOption(btn, hero) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  scores[hero]++;

  setTimeout(() => {
    current++;
    if (current < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 350);
}

function showResult() {
  document.getElementById('progressFill').style.width = '100%';
  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const hero = heroes[winner];

  document.getElementById('resultIcon').textContent = hero.icon;
  document.getElementById('resultName').textContent = hero.name;
  document.getElementById('resultBook').textContent = hero.book;
  document.getElementById('resultDesc').textContent = hero.desc;
  document.getElementById('resultQuote').textContent = hero.quote;

  document.getElementById('resultOverlay').classList.add('show');
}

function restartQuiz() {
  current = 0;
  scores = { pierre: 0, andrei: 0, master: 0, razumihin: 0, stolz: 0 };
  document.getElementById('resultOverlay').classList.remove('show');
  renderQuestion();
}
</script>

</body>
</html>
