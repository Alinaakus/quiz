<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Какая ты героиня русской классики?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Raleway', sans-serif;
    background: #fdf6ee;
    color: #2c1a0e;
    min-height: 100vh;
    padding: 20px;
  }

  .quiz-wrap {
    max-width: 560px;
    margin: 0 auto;
  }

  .quiz-header {
    text-align: center;
    padding: 32px 0 24px;
  }

  .quiz-header .tag {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #b5813a;
    margin-bottom: 12px;
  }

  .quiz-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    line-height: 1.3;
    color: #1e0f05;
    margin-bottom: 10px;
  }

  .quiz-header p {
    font-size: 14px;
    color: #7a5c3a;
    font-weight: 300;
    line-height: 1.6;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: #b5813a;
    margin: 20px auto;
    opacity: 0.5;
  }

  /* Progress */
  .progress-bar {
    height: 3px;
    background: #e8d9c4;
    border-radius: 10px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #b5813a, #d4a254);
    border-radius: 10px;
    transition: width 0.5s ease;
    width: 0%;
  }
  .progress-text {
    text-align: right;
    font-size: 11px;
    color: #b5813a;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  /* Question card */
  .question-card {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 4px 24px rgba(44,26,14,0.07);
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-num {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #b5813a;
    margin-bottom: 10px;
  }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    line-height: 1.45;
    color: #1e0f05;
    margin-bottom: 22px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: #fdf6ee;
    border: 1.5px solid #e8d9c4;
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    color: #2c1a0e;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.5;
  }

  .option-btn:hover {
    border-color: #b5813a;
    background: #fff8ee;
    transform: translateX(4px);
  }

  .option-btn.selected {
    border-color: #b5813a;
    background: linear-gradient(135deg, #fff8ee, #fdf0dc);
    color: #7a3d00;
    font-weight: 500;
  }

  /* Result popup overlay */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(30,15,5,0.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .overlay.show {
    display: flex;
    animation: overlayIn 0.3s ease;
  }

  @keyframes overlayIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .result-card {
    background: #fff;
    border-radius: 20px;
    padding: 36px 28px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(30,15,5,0.25);
    animation: cardIn 0.4s ease;
    position: relative;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .result-icon {
    font-size: 48px;
    margin-bottom: 8px;
  }

  .result-tag {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #b5813a;
    margin-bottom: 8px;
  }

  .result-name {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: #1e0f05;
    margin-bottom: 4px;
  }

  .result-book {
    font-size: 13px;
    color: #b5813a;
    font-style: italic;
    margin-bottom: 16px;
  }

  .result-divider {
    width: 40px;
    height: 1px;
    background: #e8d9c4;
    margin: 16px auto;
  }

  .result-desc {
    font-size: 15px;
    line-height: 1.7;
    color: #4a3020;
    margin-bottom: 10px;
  }

  .result-quote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: #b5813a;
    line-height: 1.6;
    padding: 14px 18px;
    background: #fdf6ee;
    border-radius: 10px;
    border-left: 3px solid #b5813a;
    margin: 16px 0 24px;
  }

  .retry-btn {
    background: #1e0f05;
    color: #fdf6ee;
    border: none;
    border-radius: 12px;
    padding: 14px 32px;
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .retry-btn:hover {
    background: #3d2010;
    transform: translateY(-2px);
  }

  /* Start screen */
  .start-screen {
    text-align: center;
    padding: 20px 0;
  }

  .start-btn {
    background: #1e0f05;
    color: #fdf6ee;
    border: none;
    border-radius: 14px;
    padding: 16px 40px;
    font-family: 'Raleway', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 8px;
  }

  .start-btn:hover {
    background: #3d2010;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(30,15,5,0.2);
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="tag">8 марта · тест</div>
    <h1>Какая ты героиня русской классики?</h1>
    <div class="divider"></div>
    <p>7 вопросов — и узнаешь, кто из великих литературных женщин живёт в тебе</p>
  </div>

  <!-- Start screen -->
  <div class="start-screen" id="startScreen">
    <button class="start-btn" onclick="startQuiz()">Начать тест →</button>
  </div>

  <!-- Quiz -->
  <div id="quizBlock" class="hidden">
    <div class="progress-text" id="progressText">1 / 7</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="question-card" id="questionCard"></div>
  </div>
</div>

<!-- Result overlay -->
<div class="overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-tag">Твоя героиня</div>
    <div class="result-name" id="resultName"></div>
    <div class="result-book" id="resultBook"></div>
    <div class="result-divider"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="result-quote" id="resultQuote"></div>
    <button class="retry-btn" onclick="restartQuiz()">Пройти ещё раз</button>
  </div>
</div>

<script>
const questions = [
  {
    text: "Пятница вечер. Ты свободна. Что делаешь?",
    options: [
      { text: "Иду на бал — жизнь слишком коротка, чтобы сидеть дома", hero: "natasha" },
      { text: "Читаю письма или пишу в дневник — мне нужно разобраться в себе", hero: "tatyana" },
      { text: "Помогаю кому-то из близких — просто потому что надо", hero: "sonya" },
      { text: "Стою у реки и смотрю на воду. Думаю о свободе", hero: "katerina" },
      { text: "Листаю философские книги и строю планы изменить мир", hero: "anna" }
    ]
  },
  {
    text: "Тебя обидели. Твоя первая реакция?",
    options: [
      { text: "Сразу скажу всё в лицо — пусть знают", hero: "natasha" },
      { text: "Уйду в себя и долго буду всё переживать внутри", hero: "tatyana" },
      { text: "Промолчу. Не хочу причинять боль в ответ", hero: "sonya" },
      { text: "Внутри всё закипит, но снаружи — тишина. Пока.", hero: "katerina" },
      { text: "Сделаю вид, что мне всё равно. Но запомню", hero: "anna" }
    ]
  },
  {
    text: "Что для тебя любовь?",
    options: [
      { text: "Праздник! Весело, громко, с танцами", hero: "natasha" },
      { text: "Тихая и глубокая. Та, о которой не говорят вслух", hero: "tatyana" },
      { text: "Служение. Любить — значит отдавать", hero: "sonya" },
      { text: "Огонь. Либо всё, либо ничего", hero: "katerina" },
      { text: "Страсть, которую не умеешь контролировать", hero: "anna" }
    ]
  },
  {
    text: "Подруга просит честного мнения о своём новом парне. Он, мягко говоря, так себе. Ты:",
    options: [
      { text: "Скажу прямо всё что думаю — она же спросила!", hero: "natasha" },
      { text: "Аккуратно намекну. Не смогу промолчать, но и обидеть не хочу", hero: "tatyana" },
      { text: "Поддержу её выбор. Главное — чтобы она была счастлива", hero: "sonya" },
      { text: "Скажу правду. Потом пусть обижается, зато честно", hero: "katerina" },
      { text: "Промолчу. Это её жизнь, её ошибки", hero: "anna" }
    ]
  },
  {
    text: "Выбери фразу, которая ближе всего к тебе:",
    options: [
      { text: "Жить нужно сейчас, пока есть силы и желание", hero: "natasha" },
      { text: "Я мечтаю о том, чего, возможно, никогда не будет", hero: "tatyana" },
      { text: "Мне важно, чтобы рядом всем было хорошо", hero: "sonya" },
      { text: "Лучше сгореть, чем медленно гаснуть", hero: "katerina" },
      { text: "Я живу на разрыв — и не могу иначе", hero: "anna" }
    ]
  },
  {
    text: "На вечеринке ты чаще всего:",
    options: [
      { text: "В центре — танцую, смеюсь, заражаю всех энергией", hero: "natasha" },
      { text: "В углу с интересным человеком — один разговор лучше ста знакомств", hero: "tatyana" },
      { text: "Слежу, чтобы всем было комфортно. Организатор по душе", hero: "sonya" },
      { text: "Прихожу, смотрю, ухожу раньше всех. Люди утомляют", hero: "katerina" },
      { text: "Блистаю — но внутри немного устала от этого", hero: "anna" }
    ]
  },
  {
    text: "Последний вопрос. Что тебя пугает больше всего?",
    options: [
      { text: "Что жизнь пройдёт мимо и я ничего не почувствую", hero: "natasha" },
      { text: "Что никто никогда не поймёт меня по-настоящему", hero: "tatyana" },
      { text: "Что я не смогу помочь тем, кого люблю", hero: "sonya" },
      { text: "Прожить всю жизнь в клетке — пусть даже золотой", hero: "katerina" },
      { text: "Потерять себя в погоне за тем, что не принесёт счастья", hero: "anna" }
    ]
  }
];

const heroes = {
  natasha: {
    name: "Наташа Ростова",
    book: "«Война и мир», Лев Толстой",
    icon: "🌿",
    desc: "Ты — живая, импульсивная, настоящая. Тебе не нужна маска — ты и есть праздник. Умеешь радоваться мелочам так, что завидуют те, у кого всё есть. Иногда ошибаешься — но никогда не притворяешься.",
    quote: "«Она не удостаивала быть умной. Наташа не удостаивала быть умной.»"
  },
  tatyana: {
    name: "Татьяна Ларина",
    book: "«Евгений Онегин», Александр Пушкин",
    icon: "🕯️",
    desc: "Ты — глубокая, верная, немного загадочная. Чувствуешь больше, чем говоришь. Любишь по-настоящему — один раз и навсегда. И умеешь с достоинством отпускать то, что не твоё.",
    quote: "«Я вас люблю — к чему лукавить?»"
  },
  sonya: {
    name: "Соня Мармеладова",
    book: "«Преступление и наказание», Достоевский",
    icon: "🕊️",
    desc: "Ты умеешь любить без условий и держать других, когда они падают. В тебе огромная внутренняя сила — тихая, но несгибаемая. Ты веришь в людей даже тогда, когда они сами в себя не верят.",
    quote: "«Страдание и боль — всегда обязательны для широкого сознания.»"
  },
  katerina: {
    name: "Катерина",
    book: "«Гроза», Александр Островский",
    icon: "⚡",
    desc: "Ты живёшь по-крупному. Тебе нужен воздух — свобода, честность, настоящее. Ты не умеешь притворяться и не хочешь. Иногда это дорого обходится — но по-другому ты не можешь.",
    quote: "«Отчего люди не летают так, как птицы?»"
  },
  anna: {
    name: "Анна Каренина",
    book: "«Анна Каренина», Лев Толстой",
    icon: "🌹",
    desc: "Ты — магнит. Притягиваешь людей без усилий, но сама от этого не всегда счастлива. Ты чувствуешь жизнь очень остро — и радость, и боль. Ищешь настоящего — и не соглашаешься на меньшее.",
    quote: "«Всё смешалось в доме Облонских.»"
  }
};

let current = 0;
let scores = { natasha: 0, tatyana: 0, sonya: 0, katerina: 0, anna: 0 };

function startQuiz() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('quizBlock').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const card = document.getElementById('questionCard');
  
  document.getElementById('progressText').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = `${((current) / questions.length) * 100}%`;

  card.innerHTML = `
    <div class="question-num">Вопрос ${current + 1}</div>
    <div class="question-text">${q.text}</div>
    <div class="options">
      ${q.options.map((opt, i) => `
        <button class="option-btn" onclick="selectOption(this, '${opt.hero}')">
          ${opt.text}
        </button>
      `).join('')}
    </div>
  `;
}

function selectOption(btn, hero) {
  // highlight
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  
  scores[hero]++;

  setTimeout(() => {
    current++;
    if (current < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 350);
}

function showResult() {
  document.getElementById('progressFill').style.width = '100%';
  
  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const hero = heroes[winner];

  document.getElementById('resultIcon').textContent = hero.icon;
  document.getElementById('resultName').textContent = hero.name;
  document.getElementById('resultBook').textContent = hero.book;
  document.getElementById('resultDesc').textContent = hero.desc;
  document.getElementById('resultQuote').textContent = hero.quote;

  document.getElementById('resultOverlay').classList.add('show');
}

function restartQuiz() {
  current = 0;
  scores = { natasha: 0, tatyana: 0, sonya: 0, katerina: 0, anna: 0 };
  document.getElementById('resultOverlay').classList.remove('show');
  renderQuestion();
}
</script>

</body>
</html>
